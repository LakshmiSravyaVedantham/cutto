name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE: cutto
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_SA_KEY != '' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 4 \
            --timeout 900 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 2 \
            --session-affinity \
            --set-env-vars "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" \
            --set-env-vars "DEMO_SECRET=${{ secrets.DEMO_SECRET }}" \
            --set-env-vars "MUSIC_DIR=./music" \
            --set-env-vars "GCS_BUCKET=${{ secrets.GCS_BUCKET }}" \
            --set-env-vars "PIPELINE_PARALLEL_BATCH_SIZE=1" \
            --set-env-vars "SCENE_TIMEOUT_SECONDS=420"

      - name: Show URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'
